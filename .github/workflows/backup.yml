name: Nightly Postgres Backup

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install postgresql-client-17
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/postgresql-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d_%H-%M-%S")
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" -F c --no-owner --no-acl -f "backup_${TIMESTAMP}.dump"
          echo "BACKUP_FILE=backup_${TIMESTAMP}.dump" >> "$GITHUB_ENV"

      - name: Install awscli
        run: pip install awscli

      - name: Upload to Backblaze B2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          aws s3 cp "$BACKUP_FILE" "s3://beyond-ink-pos-backups/backups/$BACKUP_FILE" \
            --endpoint-url https://s3.us-east-005.backblazeb2.com

      - name: Cleanup
        if: always()
        run: rm -f "$BACKUP_FILE"
